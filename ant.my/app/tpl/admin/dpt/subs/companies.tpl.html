{* Companies.tpl.html *}
{extends file="admin/dpt/dpt.tpl.html"}
{block name="SUB"}
<div class="card">
    <div class="card-header">
        <h5>Список компаний</h5>
    </div>
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>УНП</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {foreach $companies as $company}
                    <tr>
                        <td>{$company.id}</td>
                        <td><strong>{$company.name}</strong></td>
                        <td>{$company.unp|formatUnp}</td> {* Используем твой модификатор! *}
                        <td>
                            <a href="/admin/companies/edit/{$company.id}" class="btn btn-sm btn-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                        </td>
                    </tr>
                {foreachelse}
                    <tr>
                        <td colspan="4" class="text-center">Компаний пока нет</td>
                    </tr>
                {/foreach}
            </tbody>
        </table>
    </div>
</div>

{/block}
